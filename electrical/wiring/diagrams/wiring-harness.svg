<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="990" viewBox="0 0 1440 990" font-family="'Segoe UI',Arial,sans-serif">
<rect x="0" y="0" width="1440" height="990" fill="#ffffff"/>
  <defs>
    <style>
      .blk{stroke-width:1.5;}
      .title{font-weight:600;font-size:14px;fill:#1a1a1a;}
      .sub{font-weight:400;font-size:11.5px;fill:#455;}
      .subm{font-weight:600;font-size:11.5px;fill:#333;}
      .wl{font-weight:600;font-size:11px;}
      .vtag{font-weight:700;font-size:11px;}
      .nf{font-weight:700;font-size:11.5px;fill:#c62828;}
      .h1{font-weight:700;font-size:20px;fill:#111;}
      .h2{font-weight:400;font-size:12.5px;fill:#555;}
      .lg{font-weight:400;font-size:11.5px;fill:#333;}
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="990" fill="#ffffff"/>

  <!-- ============ TITLE ============ -->
  <text class="h1" x="40" y="40">Differential-drive robot ŌĆö power &amp; signal harness block diagram</text>
  <text class="h2" x="40" y="60">24 V POWER domain drawn red / thick ┬Ę 3.3 V LOGIC domain drawn blue / thin ┬Ę every rail labelled with its voltage</text>

  <!-- ============ WIRE LEGEND ============ -->
  <rect x="890" y="70" width="520" height="150" rx="8" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text class="title" x="905" y="94">Wire legend</text>
  <!-- col 1 -->
  <line x1="905" y1="116" x2="936" y2="116" stroke="#d32f2f" stroke-width="5"/>
  <text class="lg" x="944" y="120">24 V power</text>
  <line x1="905" y1="140" x2="936" y2="140" stroke="#f57c00" stroke-width="3.5"/>
  <text class="lg" x="944" y="144">5 V power</text>
  <line x1="905" y1="164" x2="936" y2="164" stroke="#1565c0" stroke-width="2"/>
  <text class="lg" x="944" y="168">3.3 V logic (GPIO / I┬▓C)</text>
  <line x1="905" y1="188" x2="936" y2="188" stroke="#7b1fa2" stroke-width="4"/>
  <text class="lg" x="944" y="192">Motor 3-phase  U / V / W</text>
  <!-- col 2 -->
  <line x1="1160" y1="116" x2="1191" y2="116" stroke="#00838f" stroke-width="2"/>
  <text class="lg" x="1199" y="120">Hall sensors + Hall 5 V / 0 V</text>
  <line x1="1160" y1="140" x2="1191" y2="140" stroke="#455a64" stroke-width="2.5"/>
  <text class="lg" x="1199" y="144">Common ground  (COM Ōåö GND)</text>
  <line x1="1160" y1="164" x2="1191" y2="164" stroke="#455a64" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="lg" x="1199" y="168">USB / CSI data link</text>
  <rect x="1160" y="182" width="31" height="12" rx="2" fill="#fff" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text class="lg" x="1199" y="192">ŌÜĀ NOT FITTED (safety gap)</text>

  <!-- ============ POWER SOURCE CHAIN ============ -->
  <!-- Battery -->
  <rect x="40" y="80" width="195" height="96" rx="6" class="blk" fill="#fdecea" stroke="#d32f2f"/>
  <text class="title" x="137" y="118" text-anchor="middle">24 V battery</text>
  <text class="sub" x="137" y="137" text-anchor="middle">2├Ś 12 V lead-acid</text>
  <text class="sub" x="137" y="153" text-anchor="middle">in series</text>
  <text class="vtag" x="137" y="98" text-anchor="middle" fill="#b71c1c">+24 V</text>

  <!-- Battery disconnect NOT FITTED -->
  <rect x="278" y="92" width="150" height="72" rx="6" fill="#fff" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6 4"/>
  <text class="subm" x="353" y="116" text-anchor="middle">Battery disconnect</text>
  <text class="nf" x="353" y="140" text-anchor="middle">ŌÜĀ NOT FITTED</text>

  <!-- Main fuse NOT FITTED -->
  <rect x="470" y="92" width="150" height="72" rx="6" fill="#fff" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6 4"/>
  <text class="subm" x="545" y="116" text-anchor="middle">Main fuse</text>
  <text class="nf" x="545" y="140" text-anchor="middle">ŌÜĀ NOT FITTED</text>

  <!-- power chain wires -->
  <line x1="235" y1="128" x2="278" y2="128" stroke="#d32f2f" stroke-width="5"/>
  <line x1="428" y1="128" x2="470" y2="128" stroke="#d32f2f" stroke-width="5"/>
  <line x1="545" y1="164" x2="545" y2="220" stroke="#d32f2f" stroke-width="5"/>

  <!-- ============ 24 V BUS ============ -->
  <rect x="40" y="220" width="1210" height="34" rx="5" fill="#f6cfcb" stroke="#d32f2f" stroke-width="3"/>
  <text class="title" x="640" y="242" text-anchor="middle" fill="#8e1c14">24 V POWER BUS</text>
  <text class="vtag" x="60" y="242" fill="#b71c1c">24 V</text>
  <text class="vtag" x="1230" y="242" text-anchor="end" fill="#b71c1c">24 V</text>

  <!-- 24 V taps -->
  <!-- to LEFT driver -->
  <line x1="415" y1="254" x2="415" y2="320" stroke="#d32f2f" stroke-width="5"/>
  <text class="vtag" x="423" y="286" fill="#b71c1c">24 V  V+/VŌłÆ</text>
  <!-- to RIGHT driver (routes down left side, around left driver) -->
  <polyline points="310,254 310,455 415,455 415,480" fill="none" stroke="#d32f2f" stroke-width="5"/>
  <text class="vtag" x="318" y="450" fill="#b71c1c">24 V  V+/VŌłÆ</text>
  <!-- to buck -->
  <line x1="1000" y1="254" x2="1000" y2="320" stroke="#d32f2f" stroke-width="5"/>
  <text class="vtag" x="1008" y="288" fill="#b71c1c">24 V</text>

  <!-- ============ MOTORS (left column) ============ -->
  <rect x="40" y="320" width="190" height="120" rx="6" class="blk" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text class="title" x="135" y="352" text-anchor="middle">LEFT BLDC motor</text>
  <text class="sub" x="135" y="371" text-anchor="middle">ZD Z4BLD60</text>
  <text class="sub" x="135" y="389" text-anchor="middle">3Žå U/V/W + 3├Ś Hall</text>
  <text class="sub" x="135" y="407" text-anchor="middle">Hall Vcc 5 V / 0 V</text>

  <rect x="40" y="480" width="190" height="120" rx="6" class="blk" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text class="title" x="135" y="512" text-anchor="middle">RIGHT BLDC motor</text>
  <text class="sub" x="135" y="531" text-anchor="middle">ZD Z4BLD60</text>
  <text class="sub" x="135" y="549" text-anchor="middle">3Žå U/V/W + 3├Ś Hall</text>
  <text class="sub" x="135" y="567" text-anchor="middle">Hall Vcc 5 V / 0 V</text>

  <!-- ============ DRIVERS ============ -->
  <rect x="300" y="320" width="230" height="120" rx="6" class="blk" fill="#eceff1" stroke="#455a64"/>
  <text class="title" x="415" y="348" text-anchor="middle">LEFT motor driver</text>
  <text class="sub" x="415" y="366" text-anchor="middle">ZBLD.C20-120L2R</text>
  <text class="subm" x="415" y="386" text-anchor="middle">PWMŌåÉT1 ┬Ę FWDŌåÉT20 ┬Ę REVŌåÉT21</text>
  <text class="subm" x="415" y="404" text-anchor="middle">COM ŌåÆ Teensy GND</text>
  <text class="vtag" x="415" y="424" text-anchor="middle" fill="#b71c1c">V+/VŌłÆ = 24 V</text>

  <rect x="300" y="480" width="230" height="120" rx="6" class="blk" fill="#eceff1" stroke="#455a64"/>
  <text class="title" x="415" y="508" text-anchor="middle">RIGHT motor driver</text>
  <text class="sub" x="415" y="526" text-anchor="middle">ZBLD.C20-120L2R</text>
  <text class="subm" x="415" y="546" text-anchor="middle">PWMŌåÉT5 ┬Ę FWDŌåÉT6 ┬Ę REVŌåÉT8</text>
  <text class="subm" x="415" y="564" text-anchor="middle">COM ŌåÆ Teensy GND</text>
  <text class="vtag" x="415" y="584" text-anchor="middle" fill="#b71c1c">V+/VŌłÆ = 24 V</text>

  <!-- driver <-> motor bundles -->
  <!-- LEFT phases -->
  <line x1="300" y1="350" x2="230" y2="350" stroke="#7b1fa2" stroke-width="4"/>
  <text class="wl" x="265" y="343" text-anchor="middle" fill="#6a1b9a">U/V/W</text>
  <!-- LEFT hall -->
  <line x1="300" y1="392" x2="230" y2="392" stroke="#00838f" stroke-width="2"/>
  <text class="wl" x="265" y="412" text-anchor="middle" fill="#00695c">Hall +5V/0V</text>
  <!-- RIGHT phases -->
  <line x1="300" y1="510" x2="230" y2="510" stroke="#7b1fa2" stroke-width="4"/>
  <text class="wl" x="265" y="503" text-anchor="middle" fill="#6a1b9a">U/V/W</text>
  <!-- RIGHT hall -->
  <line x1="300" y1="552" x2="230" y2="552" stroke="#00838f" stroke-width="2"/>
  <text class="wl" x="265" y="572" text-anchor="middle" fill="#00695c">Hall +5V/0V</text>

  <!-- ============ TEENSY (logic hub) ============ -->
  <rect x="590" y="320" width="240" height="430" rx="8" class="blk" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="title" x="710" y="352" text-anchor="middle">Teensy 4.0</text>
  <text class="vtag" x="710" y="371" text-anchor="middle" fill="#0d47a1">3.3 V LOGIC</text>
  <line x1="610" y1="384" x2="810" y2="384" stroke="#90caf9" stroke-width="1"/>
  <text class="sub" x="710" y="404" text-anchor="middle">LEFT drv  PWM1 ┬Ę FWD20 ┬Ę REV21</text>
  <text class="sub" x="710" y="422" text-anchor="middle">RIGHT drv PWM5 ┬Ę FWD6 ┬Ę REV8</text>
  <text class="sub" x="710" y="446" text-anchor="middle">LEFT enc  A/B ŌåÆ 14 / 15</text>
  <text class="sub" x="710" y="464" text-anchor="middle">RIGHT enc A/B ŌåÆ 11 / 12</text>
  <text class="sub" x="710" y="488" text-anchor="middle">IMU I┬▓C  SDA 18 ┬Ę SCL 19</text>
  <text class="sub" x="710" y="512" text-anchor="middle">USB ŌåÆ Raspberry Pi 5</text>
  <text class="subm" x="710" y="540" text-anchor="middle">GND = common ground node</text>
  <text class="sub" x="710" y="560" text-anchor="middle">(both driver COMs tie here)</text>

  <!-- Teensy <-> LEFT driver control + ground -->
  <line x1="530" y1="345" x2="590" y2="345" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="560" y="338" text-anchor="middle" fill="#0d47a1">ctrl ├Ś3</text>
  <line x1="530" y1="378" x2="590" y2="378" stroke="#455a64" stroke-width="2.5"/>
  <text class="wl" x="560" y="371" text-anchor="middle" fill="#37474f">COMŌåöGND Ōśģ</text>

  <!-- Teensy <-> RIGHT driver control + ground -->
  <line x1="530" y1="505" x2="590" y2="505" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="560" y="498" text-anchor="middle" fill="#0d47a1">ctrl ├Ś3</text>
  <line x1="530" y1="538" x2="590" y2="538" stroke="#455a64" stroke-width="2.5"/>
  <text class="wl" x="560" y="531" text-anchor="middle" fill="#37474f">COMŌåöGND Ōśģ</text>

  <!-- ============ ENCODERS ============ -->
  <rect x="40" y="640" width="190" height="80" rx="6" class="blk" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="title" x="135" y="668" text-anchor="middle">LEFT encoder</text>
  <text class="sub" x="135" y="686" text-anchor="middle">AS5040 ┬Ę 3.3 V</text>
  <text class="subm" x="135" y="704" text-anchor="middle">A/B ŌåÆ Teensy 14 / 15</text>

  <rect x="40" y="760" width="190" height="80" rx="6" class="blk" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="title" x="135" y="788" text-anchor="middle">RIGHT encoder</text>
  <text class="sub" x="135" y="806" text-anchor="middle">AS5040 ┬Ę 3.3 V</text>
  <text class="subm" x="135" y="824" text-anchor="middle">A/B ŌåÆ Teensy 11 / 12</text>

  <!-- encoder A/B lines routed under drivers up to Teensy left edge -->
  <polyline points="230,680 560,680 560,630 590,630" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="395" y="672" text-anchor="middle" fill="#0d47a1">A / B (3.3 V)</text>
  <polyline points="230,800 545,800 545,660 590,660" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="388" y="792" text-anchor="middle" fill="#0d47a1">A / B (3.3 V)</text>

  <!-- ============ IMU ============ -->
  <rect x="600" y="780" width="220" height="88" rx="6" class="blk" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="title" x="710" y="810" text-anchor="middle">MPU6500 IMU</text>
  <text class="sub" x="710" y="828" text-anchor="middle">3.3 V ┬Ę I┬▓C addr 0x68</text>
  <text class="subm" x="710" y="846" text-anchor="middle">SDAŌåÆ18 ┬Ę SCLŌåÆ19</text>

  <!-- IMU <-> Teensy I2C -->
  <line x1="695" y1="780" x2="695" y2="750" stroke="#1565c0" stroke-width="2"/>
  <line x1="725" y1="780" x2="725" y2="750" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="640" y="768" text-anchor="middle" fill="#0d47a1">I┬▓C</text>

  <!-- ============ DC-DC BUCK ============ -->
  <rect x="910" y="320" width="180" height="96" rx="6" class="blk" fill="#fff3e0" stroke="#f57c00"/>
  <text class="title" x="1000" y="352" text-anchor="middle">DC-DC buck</text>
  <text class="sub" x="1000" y="372" text-anchor="middle">24 V ŌåÆ 5 V</text>
  <text class="vtag" x="1000" y="392" text-anchor="middle" fill="#e65100">out = 5 V</text>

  <!-- buck -> Pi (5 V) -->
  <line x1="1000" y1="416" x2="1000" y2="450" stroke="#f57c00" stroke-width="3.5"/>
  <text class="vtag" x="1008" y="438" fill="#e65100">5 V</text>

  <!-- ============ RASPBERRY PI 5 ============ -->
  <rect x="910" y="450" width="250" height="190" rx="8" class="blk" fill="#e8f5e9" stroke="#2e7d32"/>
  <text class="title" x="1035" y="482" text-anchor="middle">Raspberry Pi 5</text>
  <text class="sub" x="1035" y="500" text-anchor="middle">powered from buck 5 V</text>
  <line x1="930" y1="512" x2="1140" y2="512" stroke="#a5d6a7" stroke-width="1"/>
  <text class="sub" x="1035" y="534" text-anchor="middle">USB ŌåÆ Teensy (micro-ROS)</text>
  <text class="sub" x="1035" y="558" text-anchor="middle">USB ŌåÆ RPLIDAR A1</text>
  <text class="sub" x="1035" y="582" text-anchor="middle">CSI ŌåÆ Camera Module 3</text>
  <text class="sub" x="1035" y="606" text-anchor="middle">runs ROS 2 host</text>

  <!-- Pi <-> Teensy USB -->
  <line x1="830" y1="525" x2="910" y2="525" stroke="#455a64" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="wl" x="870" y="517" text-anchor="middle" fill="#37474f">USB</text>
  <text class="wl" x="870" y="543" text-anchor="middle" fill="#37474f">micro-ROS @115200</text>

  <!-- ============ RPLIDAR ============ -->
  <rect x="910" y="680" width="210" height="86" rx="6" class="blk" fill="#eceff1" stroke="#455a64"/>
  <text class="title" x="1015" y="712" text-anchor="middle">RPLIDAR A1</text>
  <text class="sub" x="1015" y="732" text-anchor="middle">2D laser scanner</text>
  <text class="subm" x="1015" y="750" text-anchor="middle">USB ŌåÆ Raspberry Pi 5</text>

  <!-- Pi <-> RPLIDAR USB -->
  <line x1="1000" y1="640" x2="1000" y2="680" stroke="#455a64" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="wl" x="1008" y="666" fill="#37474f">USB</text>

  <!-- ============ CAMERA ============ -->
  <rect x="1170" y="680" width="180" height="86" rx="6" class="blk" fill="#eceff1" stroke="#455a64"/>
  <text class="title" x="1260" y="712" text-anchor="middle">Camera Module 3</text>
  <text class="sub" x="1260" y="732" text-anchor="middle">MIPI camera</text>
  <text class="subm" x="1260" y="750" text-anchor="middle">CSI ŌåÆ Raspberry Pi 5</text>

  <!-- Pi <-> Camera CSI -->
  <polyline points="1160,600 1260,600 1260,680" fill="none" stroke="#455a64" stroke-width="2" stroke-dasharray="5 4"/>
  <text class="wl" x="1200" y="592" text-anchor="middle" fill="#37474f">CSI ribbon</text>

  <!-- ============ SAFETY CALLOUT ============ -->
  <rect x="590" y="890" width="600" height="72" rx="8" fill="#fdecea" stroke="#d32f2f" stroke-width="2"/>
  <text x="606" y="915" font-weight="700" font-size="13px" fill="#b71c1c">ŌÜĀ Safety ŌĆö protection currently missing</text>
  <text class="sub" x="606" y="934" fill="#7f1d15">No main fuse and no battery disconnect are fitted. The 24 V bus is permanently</text>
  <text class="sub" x="606" y="951" fill="#7f1d15">live and unprotected against short-circuit. Fit both in the battery + lead before use.</text>

  <!-- ground note -->
  <rect x="40" y="882" width="500" height="80" rx="8" fill="#eceff1" stroke="#455a64" stroke-width="1.5"/>
  <text x="56" y="908" font-weight="700" font-size="13px" fill="#263238">Ōśģ Common ground is mandatory</text>
  <text class="sub" x="56" y="928" fill="#37474f">Both driver COM pins must return to the Teensy GND node, and the</text>
  <text class="sub" x="56" y="945" fill="#37474f">buck 0 V / battery ŌłÆ share it, or PWM/FWD/REV logic will not switch.</text>
</svg>
