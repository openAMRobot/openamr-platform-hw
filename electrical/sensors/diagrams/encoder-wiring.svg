<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="856" viewBox="0 0 1200 856" font-family="'Segoe UI',Arial,sans-serif">
<rect x="0" y="0" width="1200" height="856" fill="#ffffff"/>
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-weight:600;font-size:14px;fill:#1a1a1a;}
      .big{font-weight:700;font-size:15px;fill:#111;}
      .sub{font-weight:400;font-size:11.5px;fill:#455;}
      .subm{font-weight:600;font-size:12px;fill:#222;}
      .h1{font-weight:700;font-size:20px;fill:#111;}
      .h2{font-weight:400;font-size:12.5px;fill:#555;}
      .lg{font-weight:400;font-size:11.5px;fill:#333;}
      .pin{font-weight:700;font-size:12px;fill:#222;}
      .wl{font-weight:600;font-size:11px;}
      .vtag{font-weight:700;font-size:11px;}
      .rn{font-weight:400;font-size:12px;fill:#7f1d15;}
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="856" fill="#ffffff"/>

  <text class="h1" x="40" y="40">Two AS5040 quadrature encoders — wheel encoder wiring</text>
  <text class="h2" x="40" y="60">one per wheel · 3.3 V supply · common GND · quadrature A/B to Teensy 4.0</text>

  <!-- ===== RED SUPPLY-VOLTAGE NOTE ===== -->
  <rect x="700" y="74" width="460" height="104" rx="8" fill="#fdecea" stroke="#d32f2f" stroke-width="2"/>
  <text x="716" y="98" font-weight="700" font-size="13px" fill="#b71c1c">Supply must be 3.3 V — do NOT use 5 V</text>
  <text class="rn" x="716" y="118">At 5 V the AS5040 push-pull A/B outputs swing to ~4 V and</text>
  <text class="rn" x="716" y="135">over-drive the Teensy 3.3 V inputs, which are NOT 5 V tolerant.</text>
  <text class="rn" x="716" y="152">Power these encoders from the 3.3 V rail only.</text>
  <text x="716" y="170" font-weight="700" font-size="11.5px" fill="#b71c1c">Fixed 2026-06-19.</text>

  <!-- ===== 3.3 V SUPPLY RAIL ===== -->
  <rect x="90" y="200" width="1020" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text class="subm" x="600" y="217" text-anchor="middle" fill="#1b5e20">3.3 V supply rail  (from Teensy 3V3 pin)</text>
  <text class="vtag" x="100" y="217" fill="#1b5e20">+3.3 V</text>
  <text class="vtag" x="1100" y="217" text-anchor="end" fill="#1b5e20">+3.3 V</text>

  <!-- ===== LEFT ENCODER ===== -->
  <rect x="90" y="340" width="180" height="200" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text class="big" x="180" y="368" text-anchor="middle">AS5040</text>
  <text class="sub" x="180" y="386" text-anchor="middle">LEFT wheel encoder</text>
  <text class="sub" x="180" y="402" text-anchor="middle">magnetic quadrature</text>
  <text class="pin" x="180" y="330" text-anchor="middle" fill="#1b5e20">VDD</text>
  <text class="pin" x="180" y="558" text-anchor="middle" fill="#37474f">VSS</text>
  <text class="pin" x="258" y="424" text-anchor="end">A</text>
  <text class="pin" x="258" y="464" text-anchor="end">B</text>
  <circle cx="180" cy="340" r="3" fill="#2e7d32"/>
  <circle cx="180" cy="540" r="3" fill="#455a64"/>
  <circle cx="270" cy="420" r="3" fill="#1565c0"/>
  <circle cx="270" cy="460" r="3" fill="#1565c0"/>

  <!-- ===== RIGHT ENCODER ===== -->
  <rect x="930" y="340" width="180" height="200" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text class="big" x="1020" y="368" text-anchor="middle">AS5040</text>
  <text class="sub" x="1020" y="386" text-anchor="middle">RIGHT wheel encoder</text>
  <text class="sub" x="1020" y="402" text-anchor="middle">magnetic quadrature</text>
  <text class="pin" x="1020" y="330" text-anchor="middle" fill="#1b5e20">VDD</text>
  <text class="pin" x="1020" y="558" text-anchor="middle" fill="#37474f">VSS</text>
  <text class="pin" x="942" y="424">A</text>
  <text class="pin" x="942" y="464">B</text>
  <circle cx="1020" cy="340" r="3" fill="#2e7d32"/>
  <circle cx="1020" cy="540" r="3" fill="#455a64"/>
  <circle cx="930" cy="420" r="3" fill="#1565c0"/>
  <circle cx="930" cy="460" r="3" fill="#1565c0"/>

  <!-- ===== TEENSY ===== -->
  <rect x="500" y="340" width="200" height="200" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text class="big" x="600" y="368" text-anchor="middle">Teensy 4.0</text>
  <text class="sub" x="600" y="386" text-anchor="middle">3.3 V logic</text>
  <text class="wl" x="600" y="402" text-anchor="middle" fill="#b71c1c">inputs NOT 5 V tolerant</text>
  <text class="pin" x="600" y="330" text-anchor="middle" fill="#1b5e20">3V3</text>
  <text class="pin" x="600" y="558" text-anchor="middle" fill="#37474f">GND</text>
  <text class="pin" x="512" y="424">14</text>
  <text class="pin" x="512" y="464">15</text>
  <text class="pin" x="688" y="424" text-anchor="end">11</text>
  <text class="pin" x="688" y="464" text-anchor="end">12</text>
  <circle cx="600" cy="340" r="3" fill="#2e7d32"/>
  <circle cx="600" cy="540" r="3" fill="#455a64"/>
  <circle cx="500" cy="420" r="3" fill="#1565c0"/>
  <circle cx="500" cy="460" r="3" fill="#1565c0"/>
  <circle cx="700" cy="420" r="3" fill="#1565c0"/>
  <circle cx="700" cy="460" r="3" fill="#1565c0"/>

  <!-- ===== SIGNAL WIRES (blue) ===== -->
  <line x1="270" y1="420" x2="500" y2="420" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="385" y="413" text-anchor="middle" fill="#0d47a1">A &#8594; pin 14</text>
  <line x1="270" y1="460" x2="500" y2="460" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="385" y="453" text-anchor="middle" fill="#0d47a1">B &#8594; pin 15</text>
  <line x1="930" y1="420" x2="700" y2="420" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="815" y="413" text-anchor="middle" fill="#0d47a1">A &#8594; pin 11</text>
  <line x1="930" y1="460" x2="700" y2="460" stroke="#1565c0" stroke-width="2"/>
  <text class="wl" x="815" y="453" text-anchor="middle" fill="#0d47a1">B &#8594; pin 12</text>

  <!-- ===== 3.3 V WIRES (green) ===== -->
  <line x1="180" y1="340" x2="180" y2="224" stroke="#2e7d32" stroke-width="2.5"/>
  <line x1="600" y1="340" x2="600" y2="224" stroke="#2e7d32" stroke-width="2.5"/>
  <line x1="1020" y1="340" x2="1020" y2="224" stroke="#2e7d32" stroke-width="2.5"/>
  <text class="vtag" x="188" y="290" fill="#1b5e20">3.3 V</text>
  <text class="vtag" x="608" y="290" fill="#1b5e20">3.3 V (source)</text>
  <text class="vtag" x="1028" y="290" fill="#1b5e20">3.3 V</text>

  <!-- ===== COMMON GND RAIL ===== -->
  <rect x="90" y="612" width="1020" height="24" rx="4" fill="#eceff1" stroke="#455a64" stroke-width="2.5"/>
  <text class="subm" x="600" y="629" text-anchor="middle" fill="#263238">Common GND</text>
  <line x1="180" y1="540" x2="180" y2="612" stroke="#455a64" stroke-width="2.5"/>
  <line x1="600" y1="540" x2="600" y2="612" stroke="#455a64" stroke-width="2.5"/>
  <line x1="1020" y1="540" x2="1020" y2="612" stroke="#455a64" stroke-width="2.5"/>

  <!-- ===== QUADRATURE INSET ===== -->
  <rect x="90" y="664" width="700" height="176" rx="8" fill="#fafafa" stroke="#bbb"/>
  <text class="title" x="110" y="688">Quadrature output — A &amp; B 90&#176; out of phase</text>

  <!-- phase marker in the clear band above the waveforms -->
  <line x1="240" y1="705" x2="260" y2="705" stroke="#616161" stroke-width="1.2" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="sub" x="272" y="709" fill="#616161">90&#176; = quarter period</text>

  <!-- channel labels -->
  <text class="pin" x="128" y="738" fill="#1565c0">A</text>
  <text class="pin" x="128" y="788" fill="#00838f">B</text>

  <!-- A waveform (high=722, low=746) -->
  <polyline fill="none" stroke="#1565c0" stroke-width="2"
    points="160,722 200,722 200,746 240,746 240,722 280,722 280,746 320,746 320,722 360,722 360,746 400,746 400,722 440,722 440,746 480,746 480,722 520,722 520,746 560,746 560,722 600,722"/>
  <!-- B waveform (high=772, low=796), lagging A by a quarter period -->
  <polyline fill="none" stroke="#00838f" stroke-width="2"
    points="160,772 220,772 220,796 260,796 260,772 300,772 300,796 340,796 340,772 380,772 380,796 420,796 420,772 460,772 460,796 500,796 500,772 540,772 540,796 580,796 580,772 600,772"/>

  <!-- phase reference guide lines (A rising @240, B rising @260) -->
  <line x1="240" y1="708" x2="240" y2="802" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="260" y1="708" x2="260" y2="802" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- time axis -->
  <line x1="150" y1="814" x2="612" y2="814" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arw)"/>
  <text class="sub" x="588" y="808" fill="#607d8b">time</text>

  <!-- direction / resolution annotations -->
  <text class="subm" x="628" y="706">Edge order sets direction:</text>
  <text class="sub" x="628" y="726">A before B  &#8594;  forward</text>
  <text class="sub" x="628" y="744">B before A  &#8594;  reverse</text>
  <path d="M642 762 A 15 15 0 1 1 632 775" fill="none" stroke="#5e35b1" stroke-width="1.6" marker-end="url(#arw)"/>
  <text class="sub" x="666" y="770" fill="#4a148c">sense of rotation</text>
  <line x1="628" y1="786" x2="778" y2="786" stroke="#ddd" stroke-width="1"/>
  <text class="subm" x="628" y="806">1024 counts / rev</text>
  <text class="sub" x="628" y="824">10-bit AS5040 · 4&#215; quadrature</text>
</svg>
