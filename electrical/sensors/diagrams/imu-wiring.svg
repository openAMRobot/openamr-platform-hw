<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="800" viewBox="0 0 1240 800" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- FULL-CANVAS WHITE BACKGROUND (first element) -->
  <rect x="0" y="0" width="1240" height="800" fill="#ffffff"/>

  <text x="40" y="40" font-weight="700" font-size="20px" fill="#1a1a1a">IMU breakout (board marked MPU-6050, silicon MPU6500) — I&#178;C to Teensy 4.0</text>
  <text x="40" y="62" font-weight="400" font-size="12.5px" fill="#1a1a1a">SDA &#8594; pin 18, SCL &#8594; pin 19 (Teensy 4.0 default Wire bus) · 3.3 V from the Teensy 3V3 pin · common GND · I&#178;C address 0x68</text>

  <!-- ===== 3.3 V SUPPLY RAIL ===== -->
  <rect x="90" y="190" width="1060" height="24" rx="5" fill="#e6f0fa" stroke="#2c6fbb" stroke-width="2.5"/>
  <text x="380" y="207" font-weight="700" font-size="12px" fill="#2c6fbb">3.3 V supply rail</text>
  <text x="500" y="207" font-weight="700" font-size="12px" fill="#c0392b">(NOT 5 V)</text>
  <text x="100" y="207" font-weight="700" font-size="11px" fill="#2c6fbb">+3.3 V</text>
  <text x="1140" y="207" text-anchor="end" font-weight="700" font-size="11px" fill="#2c6fbb">+3.3 V</text>

  <!-- ===== ON-BOARD PULL-UP RESISTORS (no value printed) ===== -->
  <text x="580" y="244" text-anchor="middle" font-weight="600" font-size="11px" fill="#1a1a1a">on-board pull-ups</text>
  <!-- SDA pull-up @ x=540 -->
  <line x1="540" y1="214" x2="540" y2="254" stroke="#2c6fbb" stroke-width="2"/>
  <rect x="533" y="254" width="14" height="46" rx="2" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.3"/>
  <line x1="540" y1="300" x2="540" y2="430" stroke="#888888" stroke-width="2"/>
  <circle cx="540" cy="430" r="3.5" fill="#888888"/>
  <circle cx="540" cy="214" r="3.5" fill="#2c6fbb"/>
  <!-- SCL pull-up @ x=620 (crosses SDA bus; hop shows no connection) -->
  <line x1="620" y1="214" x2="620" y2="254" stroke="#2c6fbb" stroke-width="2"/>
  <rect x="613" y="254" width="14" height="46" rx="2" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.3"/>
  <line x1="620" y1="300" x2="620" y2="470" stroke="#888888" stroke-width="2"/>
  <circle cx="620" cy="470" r="3.5" fill="#888888"/>
  <circle cx="620" cy="214" r="3.5" fill="#2c6fbb"/>

  <!-- ===== GREEN "3.3 V, safe" NOTE ===== -->
  <rect x="700" y="234" width="392" height="92" rx="8" fill="#e9f7ef" stroke="#2e8b57" stroke-width="1.8"/>
  <text x="716" y="256" font-weight="700" font-size="13px" fill="#2e8b57">3.3 V, safe</text>
  <text x="716" y="276" font-size="11.5px" fill="#1a1a1a">On-board pull-ups tie SDA/SCL to 3.3 V, so the I&#178;C lines</text>
  <text x="716" y="293" font-size="11.5px" fill="#1a1a1a">never exceed 3.3 V — safe for the Teensy inputs,</text>
  <text x="716" y="310" font-size="11.5px" fill="#1a1a1a">which are NOT 5 V tolerant.</text>

  <!-- ===== IMU BREAKOUT ===== -->
  <rect x="90" y="300" width="270" height="290" rx="10" fill="#f5f8fc" stroke="#2c6fbb" stroke-width="1.6"/>
  <text x="225" y="332" text-anchor="middle" font-weight="700" font-size="15px" fill="#1a1a1a">IMU breakout</text>
  <text x="225" y="353" text-anchor="middle" font-size="11.5px" fill="#1a1a1a">silkscreen: "MPU-6050"</text>
  <text x="225" y="373" text-anchor="middle" font-weight="700" font-size="12.5px" fill="#c0392b">actual silicon: MPU6500</text>
  <text x="225" y="391" text-anchor="middle" font-size="11px" fill="#1a1a1a">WHO_AM_I = 0x70</text>
  <!-- pins -->
  <text x="350" y="434" text-anchor="end" font-weight="700" font-size="12px" fill="#1a1a1a">SDA</text>
  <text x="350" y="474" text-anchor="end" font-weight="700" font-size="12px" fill="#1a1a1a">SCL</text>
  <circle cx="360" cy="430" r="3.5" fill="#888888"/>
  <circle cx="360" cy="470" r="3.5" fill="#888888"/>
  <text x="200" y="320" text-anchor="middle" font-weight="700" font-size="12px" fill="#2c6fbb">VCC</text>
  <circle cx="200" cy="300" r="3.5" fill="#2c6fbb"/>
  <text x="200" y="578" text-anchor="middle" font-weight="700" font-size="12px" fill="#444444">GND</text>
  <circle cx="200" cy="590" r="3.5" fill="#444444"/>
  <!-- greyed unused pins: XCL, XDA, INT, AD0 -->
  <text x="102" y="434" font-weight="600" font-size="12px" fill="#9aa0a6">XCL</text>
  <text x="102" y="469" font-weight="600" font-size="12px" fill="#9aa0a6">XDA</text>
  <text x="102" y="504" font-weight="600" font-size="12px" fill="#9aa0a6">INT</text>
  <text x="102" y="539" font-weight="600" font-size="12px" fill="#9aa0a6">AD0</text>
  <line x1="90" y1="430" x2="58" y2="430" stroke="#b8b8b8" stroke-width="2"/>
  <line x1="90" y1="465" x2="58" y2="465" stroke="#b8b8b8" stroke-width="2"/>
  <line x1="90" y1="500" x2="58" y2="500" stroke="#b8b8b8" stroke-width="2"/>
  <line x1="90" y1="535" x2="58" y2="535" stroke="#b8b8b8" stroke-width="2"/>
  <text x="52" y="434" text-anchor="end" font-size="10.5px" fill="#9aa0a6">n/c</text>
  <text x="52" y="469" text-anchor="end" font-size="10.5px" fill="#9aa0a6">n/c</text>
  <text x="52" y="504" text-anchor="end" font-size="10.5px" fill="#9aa0a6">n/c</text>
  <text x="52" y="539" text-anchor="end" font-size="10.5px" fill="#9aa0a6">n/c</text>

  <!-- ===== TEENSY 4.0 ===== -->
  <rect x="790" y="300" width="230" height="290" rx="10" fill="#f5f8fc" stroke="#2c6fbb" stroke-width="1.6"/>
  <text x="905" y="332" text-anchor="middle" font-weight="700" font-size="15px" fill="#1a1a1a">Teensy 4.0</text>
  <text x="905" y="350" text-anchor="middle" font-size="11.5px" fill="#1a1a1a">3.3 V logic</text>
  <text x="905" y="368" text-anchor="middle" font-weight="600" font-size="11px" fill="#c0392b">inputs NOT 5 V tolerant</text>
  <text x="802" y="434" font-weight="700" font-size="12px" fill="#1a1a1a">18  SDA</text>
  <text x="802" y="474" font-weight="700" font-size="12px" fill="#1a1a1a">19  SCL</text>
  <text x="905" y="512" text-anchor="middle" font-size="10.5px" fill="#1a1a1a">default Wire (I&#178;C) bus</text>
  <circle cx="790" cy="430" r="3.5" fill="#888888"/>
  <circle cx="790" cy="470" r="3.5" fill="#888888"/>
  <text x="905" y="320" text-anchor="middle" font-weight="700" font-size="12px" fill="#2c6fbb">3V3</text>
  <circle cx="905" cy="300" r="3.5" fill="#2c6fbb"/>
  <text x="905" y="578" text-anchor="middle" font-weight="700" font-size="12px" fill="#444444">GND</text>
  <circle cx="905" cy="590" r="3.5" fill="#444444"/>

  <!-- ===== I2C DATA BUS WIRES (grey, bidirectional; SDA hops SCL pull-up) ===== -->
  <path d="M360 430 H612 A 8 8 0 0 1 628 430 H790" fill="none" stroke="#888888" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="470" y="424" font-weight="600" font-size="11px" fill="#666666">SDA</text>
  <line x1="360" y1="470" x2="790" y2="470" stroke="#888888" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="470" y="464" font-weight="600" font-size="11px" fill="#666666">SCL</text>

  <!-- ===== 3.3 V WIRES (blue) ===== -->
  <line x1="200" y1="214" x2="200" y2="300" stroke="#2c6fbb" stroke-width="2.5" marker-end="url(#ar)"/>
  <circle cx="200" cy="214" r="3.5" fill="#2c6fbb"/>
  <text x="208" y="262" font-weight="700" font-size="11px" fill="#2c6fbb">3.3 V</text>
  <line x1="905" y1="300" x2="905" y2="214" stroke="#2c6fbb" stroke-width="2.5"/>
  <circle cx="905" cy="214" r="3.5" fill="#2c6fbb"/>
  <text x="913" y="262" font-weight="700" font-size="11px" fill="#2c6fbb">from Teensy 3V3</text>

  <!-- ===== GND WIRES (dark) ===== -->
  <line x1="200" y1="590" x2="200" y2="650" stroke="#444444" stroke-width="2.5"/>
  <line x1="905" y1="590" x2="905" y2="650" stroke="#444444" stroke-width="2.5"/>

  <!-- ===== COMMON GND RAIL ===== -->
  <rect x="90" y="650" width="1060" height="24" rx="5" fill="#eeeeee" stroke="#444444" stroke-width="2.5"/>
  <text x="600" y="667" text-anchor="middle" font-weight="700" font-size="12px" fill="#444444">Common GND  (Teensy &#8596; IMU)</text>
  <circle cx="200" cy="650" r="3.5" fill="#444444"/>
  <circle cx="905" cy="650" r="3.5" fill="#444444"/>

  <!-- ===== CHIP / DRIVER / ADDRESS NOTE ===== -->
  <rect x="90" y="692" width="640" height="92" rx="8" fill="#ffffff" stroke="#bbbbbb" stroke-width="1.3"/>
  <text x="106" y="714" font-weight="700" font-size="12.5px" fill="#1a1a1a">Board marked MPU-6050 — the actual silicon is an MPU6500.</text>
  <text x="106" y="734" font-size="11.5px" fill="#1a1a1a">WHO_AM_I = 0x70  (a true MPU6050 reads 0x68).  3-axis accel + gyro, NO magnetometer.</text>
  <text x="106" y="753" font-size="11.5px" fill="#1a1a1a">Driven through the MPU9250 driver (register-map compatible).</text>
  <text x="106" y="772" font-size="11px" fill="#9aa0a6">AD0 left floating; the module's on-board pull-down keeps the I&#178;C address at 0x68.</text>

  <!-- ===== COLOUR LEGEND ===== -->
  <rect x="760" y="692" width="400" height="92" rx="8" fill="#ffffff" stroke="#bbbbbb" stroke-width="1.3"/>
  <text x="776" y="714" font-weight="700" font-size="12.5px" fill="#1a1a1a">Colour legend</text>
  <line x1="776" y1="732" x2="802" y2="732" stroke="#2c6fbb" stroke-width="3"/>
  <text x="810" y="736" font-size="11.5px" fill="#1a1a1a">3.3 V supply / logic</text>
  <line x1="776" y1="754" x2="802" y2="754" stroke="#888888" stroke-width="3"/>
  <text x="810" y="758" font-size="11.5px" fill="#1a1a1a">I&#178;C data bus (SDA/SCL)</text>
  <line x1="776" y1="776" x2="802" y2="776" stroke="#444444" stroke-width="3"/>
  <text x="810" y="780" font-size="11.5px" fill="#1a1a1a">common GND</text>
  <rect x="1000" y="726" width="26" height="11" rx="2" fill="#e9f7ef" stroke="#2e8b57"/>
  <text x="1034" y="736" font-size="11.5px" fill="#1a1a1a">safe / OK note</text>
  <line x1="1000" y1="754" x2="1026" y2="754" stroke="#c0392b" stroke-width="3"/>
  <text x="1034" y="758" font-size="11.5px" fill="#1a1a1a">warning / caution</text>
</svg>
