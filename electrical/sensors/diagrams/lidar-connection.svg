<svg width="820" height="410" viewBox="0 0 830 410" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">RPLIDAR A1 to Raspberry Pi 5 via Slamtec STC-A0317-R03 USB adapter</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">RPLIDAR A1 connects by USB cable to a Slamtec USB adapter board STC-A0317-R03, which carries a Silicon Labs CP2102 USB-to-UART bridge (VID:PID 10c4:ea60), into a USB port on the Raspberry Pi 5. It appears as /dev/ttyUSB0; use the stable /dev/serial/by-id path. Powered over the same USB, 5 V bus-powered. The LiDAR is on the Pi, not the Teensy.</desc>
<rect x="0" y="0" width="820" height="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<defs>
<marker id="gArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9 z" fill="#888888"/></marker>
<marker id="oArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9 z" fill="#e67e22"/></marker>
</defs>
<g font-family="Helvetica, Arial, sans-serif" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

<text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:20px;font-weight:700;text-anchor:middle;dominant-baseline:auto">2D LiDAR — RPLIDAR A1 to Raspberry Pi 5 (USB)</text>

<rect x="36" y="110" width="170" height="110" rx="10" fill="#ffffff" stroke="#333333" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(51, 51, 51);color:rgb(11, 11, 11);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="121" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:auto">RPLIDAR A1</text>
<text x="121" y="180" text-anchor="middle" font-size="12.5" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12.5px;font-weight:400;text-anchor:middle;dominant-baseline:auto">360° 2D laser scanner</text>

<rect x="286" y="110" width="240" height="110" rx="10" fill="#ffffff" stroke="#333333" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(51, 51, 51);color:rgb(11, 11, 11);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="406" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:14px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Slamtec USB adapter</text>
<text x="406" y="150" text-anchor="middle" font-size="12" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">board STC-A0317-R03</text>
