<text x="406" y="194" text-anchor="middle" font-size="10.5" fill="#888888" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:10.5px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Silicon Labs · 10c4:ea60</text>

<rect x="606" y="110" width="170" height="110" rx="10" fill="#ffffff" stroke="#333333" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(51, 51, 51);color:rgb(11, 11, 11);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="691" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Raspberry Pi 5</text>
