<line x1="526" y1="165" x2="604" y2="165" stroke="#888888" stroke-width="2" marker-end="url(#gArrow)" style="fill:rgb(0, 0, 0);stroke:rgb(136, 136, 136);color:rgb(11, 11, 11);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="565" y="151" text-anchor="middle" font-size="12" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">USB</text>
<text x="565" y="183" text-anchor="middle" font-size="11" fill="#666666" style="fill:rgb(102, 102, 102);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">/dev/ttyUSB0</text>

<path d="M691 220 L691 244 L121 244 L121 222" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#oArrow)" style="fill:none;stroke:rgb(230, 126, 34);color:rgb(11, 11, 11);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="406" y="262" text-anchor="middle" font-size="12" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">5 V — powered over the same USB cable (bus-powered)</text>

<rect x="36" y="286" width="372" height="76" rx="10" fill="#ffffff" stroke="#2e8b57" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(46, 139, 87);color:rgb(11, 11, 11);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="52" y="310" font-size="13" font-weight="700" fill="#2e8b57" style="fill:rgb(46, 139, 87);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:13px;font-weight:700;text-anchor:start;dominant-baseline:auto">✓ On the Raspberry Pi 5 (not the Teensy)</text>
<text x="52" y="331" font-size="12" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">The LiDAR enumerates as a USB serial device</text>
<text x="52" y="349" font-size="12" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">on the Pi 5; the Teensy 4.0 drives motors only.</text>

<rect x="428" y="286" width="356" height="76" rx="10" fill="#ffffff" stroke="#888888" stroke-width="1.5" style="fill:rgb(255, 255, 255);stroke:rgb(136, 136, 136);color:rgb(11, 11, 11);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="444" y="310" font-size="13" font-weight="700" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:13px;font-weight:700;text-anchor:start;dominant-baseline:auto">Use the stable device path</text>
<text x="444" y="331" font-size="11" fill="#2c6fbb" style="fill:rgb(44, 111, 187);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">/dev/serial/by-id/usb-Silicon_Labs_CP2102</text>
<text x="444" y="349" font-size="11" fill="#2c6fbb" style="fill:rgb(44, 111, 187);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">_...-if00-port0   (not /dev/ttyUSB0)</text>

